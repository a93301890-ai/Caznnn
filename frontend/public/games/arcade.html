<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arcade Games</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap");

      :root {
        color-scheme: dark;
        --panel: rgba(10, 14, 22, 0.92);
        --accent: #6ddcff;
        --accent-2: #b18cff;
        --muted: rgba(225, 238, 255, 0.72);
        --gold: #ffd166;
        --danger: #ff8d8d;
        --success: #a5ffb1;
        --border: rgba(109, 220, 255, 0.25);
        --card: rgba(9, 13, 20, 0.72);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        background:
          radial-gradient(circle at 15% 18%, rgba(109, 220, 255, 0.22), transparent 46%),
          radial-gradient(circle at 85% 10%, rgba(177, 140, 255, 0.18), transparent 44%),
          radial-gradient(circle at 70% 80%, rgba(255, 209, 102, 0.12), transparent 50%),
          linear-gradient(160deg, #0c1220, #070b14 60%, #05070c);
        color: #e9faff;
        font-family: "Rajdhani", "Inter", "Segoe UI", system-ui, sans-serif;
        padding: 26px 18px 40px;
      }

      .arcade-shell {
        width: min(1200px, 96vw);
        display: grid;
        gap: 14px;
      }

      .arcade-shell.in-iframe .arcade-topbar {
        display: none;
      }

      .arcade-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 16px;
        border-radius: 14px;
        background: rgba(9, 14, 22, 0.75);
        border: 1px solid rgba(109, 220, 255, 0.22);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(12px);
      }

      .arcade-topbar__left {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .arcade-badge {
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(233, 250, 255, 0.7);
      }

      .arcade {
        width: 100%;
        min-height: min(76vh, 680px);
        display: grid;
        grid-template-columns: minmax(240px, 340px) 1fr;
        gap: 16px;
        background: var(--panel);
        border-radius: 18px;
        border: 1px solid rgba(109, 220, 255, 0.26);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        padding: 16px;
        position: relative;
        overflow: hidden;
      }

      .arcade::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg, transparent, rgba(109, 220, 255, 0.1), transparent);
        opacity: 0.7;
        pointer-events: none;
      }

      .arcade::after {
        content: "";
        position: absolute;
        inset: -30%;
        background: radial-gradient(circle, rgba(255, 214, 102, 0.12), transparent 60%);
        opacity: 0.65;
        pointer-events: none;
      }

      .arcade-shell {
        --theme-accent: rgba(127, 216, 255, 0.18);
        --theme-glow: rgba(255, 214, 102, 0.2);
        --theme-bg-1: rgba(12, 18, 28, 0.92);
        --theme-bg-2: rgba(6, 9, 14, 0.98);
      }

      .arcade-shell[data-theme="plinko"] {
        --theme-accent: rgba(91, 192, 255, 0.24);
        --theme-glow: rgba(255, 210, 120, 0.3);
        --theme-bg-1: rgba(12, 20, 34, 0.92);
        --theme-bg-2: rgba(6, 10, 18, 0.98);
      }

      .arcade-shell[data-theme="tower"] {
        --theme-accent: rgba(255, 170, 90, 0.22);
        --theme-glow: rgba(255, 120, 120, 0.3);
        --theme-bg-1: rgba(18, 22, 34, 0.92);
        --theme-bg-2: rgba(8, 10, 16, 0.98);
      }

      .arcade-shell[data-theme="roulette"] {
        --theme-accent: rgba(255, 90, 90, 0.22);
        --theme-glow: rgba(255, 214, 102, 0.35);
        --theme-bg-1: rgba(20, 14, 22, 0.92);
        --theme-bg-2: rgba(8, 8, 12, 0.98);
      }

      .arcade-shell[data-theme="crash"] {
        --theme-accent: rgba(29, 223, 116, 0.22);
        --theme-glow: rgba(80, 255, 190, 0.32);
        --theme-bg-1: rgba(10, 20, 16, 0.92);
        --theme-bg-2: rgba(6, 10, 10, 0.98);
      }

      .arcade-shell[data-theme="mines"] {
        --theme-accent: rgba(255, 120, 120, 0.2);
        --theme-glow: rgba(255, 180, 100, 0.28);
        --theme-bg-1: rgba(20, 16, 16, 0.92);
        --theme-bg-2: rgba(10, 8, 8, 0.98);
      }

      .arcade-shell[data-theme="jackpot"] {
        --theme-accent: rgba(255, 210, 120, 0.24);
        --theme-glow: rgba(255, 240, 180, 0.35);
        --theme-bg-1: rgba(18, 14, 8, 0.92);
        --theme-bg-2: rgba(12, 8, 6, 0.98);
      }

      .arcade-shell[data-theme="dice"],
      .arcade-shell[data-theme="coinflip"] {
        --theme-accent: rgba(160, 140, 255, 0.22);
        --theme-glow: rgba(127, 216, 255, 0.3);
        --theme-bg-1: rgba(16, 16, 26, 0.92);
        --theme-bg-2: rgba(8, 8, 16, 0.98);
      }

      .arcade::before {
        background: linear-gradient(
          120deg,
          transparent,
          var(--theme-accent),
          transparent
        );
      }

      .panel,
      .stage {
        background: linear-gradient(160deg, var(--theme-bg-1), var(--theme-bg-2));
      }

      .panel {
        position: relative;
        z-index: 1;
        background: var(--card);
        border-radius: 14px;
        border: 1px solid var(--border);
        padding: 16px;
        display: grid;
        gap: 12px;
        align-content: start;
        box-shadow:
          inset 0 0 20px rgba(255, 196, 118, 0.12),
          0 0 24px rgba(109, 220, 255, 0.16);
        background: linear-gradient(160deg, rgba(12, 18, 30, 0.92), rgba(6, 9, 16, 0.92));
      }

      .panel-title {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--gold);
      }

      .panel-sub {
        font-size: 12px;
        color: var(--muted);
      }

      .stat {
        display: grid;
        gap: 6px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: inset 0 0 14px rgba(255, 255, 255, 0.04);
      }

      .stat-label {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .stat-value {
        font-size: 18px;
        font-weight: 700;
      }

      .input {
        width: 100%;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        color: #e9faff;
        padding: 8px 10px;
        font-size: 14px;
      }

      .btn {
        border: 1px solid rgba(109, 220, 255, 0.35);
        background: rgba(109, 220, 255, 0.16);
        color: #e9faff;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 13px;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
      }

      .btn.glow-active {
        box-shadow:
          0 0 16px rgba(109, 220, 255, 0.8),
          0 0 28px rgba(255, 214, 102, 0.65);
        transform: translateY(-1px);
        animation: glow-pulse 1.2s ease-in-out infinite;
      }

      .btn.primary {
        background: linear-gradient(90deg, #1ddf74, #00c853);
        border: none;
        color: #051a0b;
        font-weight: 700;
        box-shadow: 0 10px 24px rgba(29, 223, 116, 0.35);
      }

      .btn.secondary {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.14);
      }

      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .status {
        font-size: 12px;
        color: var(--muted);
      }

      .game-controls {
        display: grid;
        gap: 10px;
      }

      .control-row {
        display: grid;
        gap: 6px;
      }

      .control-row label {
        font-size: 12px;
        color: var(--muted);
      }

      .pill {
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        font-size: 12px;
      }

      .stage {
        position: relative;
        z-index: 1;
        background: var(--card);
        border-radius: 14px;
        border: 1px solid var(--border);
        padding: 16px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 12px;
        box-shadow:
          inset 0 0 22px rgba(255, 196, 118, 0.12),
          0 0 24px rgba(0, 0, 0, 0.35),
          0 0 40px rgba(109, 220, 255, 0.15);
        background: linear-gradient(160deg, rgba(10, 14, 24, 0.92), rgba(6, 9, 16, 0.96));
      }

      .stage.auto-stage {
        grid-template-rows: auto auto auto;
      }

      .stage-title {
        font-size: 18px;
        font-weight: 700;
        color: var(--gold);
      }

      .stage-hint {
        font-size: 12px;
        color: var(--muted);
      }

      .stage-body {
        position: relative;
        min-height: 280px;
        height: clamp(280px, 52vh, 520px);
        border-radius: 12px;
        background: rgba(10, 16, 26, 0.88);
        border: 1px solid rgba(109, 220, 255, 0.2);
        display: grid;
        place-items: center;
        padding: 14px;
        overflow: hidden;
      }

      .game-frame {
        position: relative;
        width: min(980px, 100%);
        min-height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 14px;
        padding: 16px;
        border-radius: 18px;
        background: linear-gradient(160deg, rgba(10, 14, 24, 0.92), rgba(6, 9, 16, 0.96));
        border: 1px solid rgba(109, 220, 255, 0.25);
        box-shadow:
          0 24px 50px rgba(0, 0, 0, 0.55),
          inset 0 0 40px rgba(109, 220, 255, 0.08);
        overflow: hidden;
      }

      .game-frame::before {
        content: "";
        position: absolute;
        inset: -40%;
        background: conic-gradient(
          from 90deg,
          rgba(109, 220, 255, 0.18),
          rgba(255, 214, 102, 0.12),
          rgba(177, 140, 255, 0.18),
          rgba(109, 220, 255, 0.18)
        );
        filter: blur(30px);
        opacity: 0.5;
        animation: aurora-spin 14s linear infinite;
        pointer-events: none;
      }

      .game-frame::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.08), transparent);
        transform: translateX(-120%);
        animation: frame-sheen 6s ease-in-out infinite;
        pointer-events: none;
      }

      .game-hud {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(9, 14, 22, 0.85);
        border: 1px solid rgba(109, 220, 255, 0.2);
        box-shadow:
          inset 0 0 16px rgba(109, 220, 255, 0.12),
          0 0 18px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(12px);
      }

      .game-hud__title {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--gold);
      }

      .game-hud__meta {
        font-size: 12px;
        color: var(--muted);
      }

      .game-hud__stats {
        display: flex;
        gap: 10px;
      }

      .game-hud__stat {
        display: grid;
        gap: 4px;
        padding: 6px 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        min-width: 90px;
        text-align: right;
      }

      .game-hud__stat small {
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .game-hud__stat strong {
        font-size: 14px;
        color: #fefcff;
      }

      .game-content {
        position: relative;
        z-index: 1;
        display: grid;
        place-items: center;
        gap: 12px;
        padding: 16px;
        border-radius: 16px;
        background: rgba(10, 14, 22, 0.85);
        border: 1px solid rgba(109, 220, 255, 0.18);
        box-shadow:
          inset 0 0 24px rgba(109, 220, 255, 0.08),
          0 0 28px rgba(0, 0, 0, 0.35);
        min-height: 260px;
        width: 100%;
      }

      .arcade-shell[data-theme="crash"] .game-frame {
        background: linear-gradient(160deg, rgba(6, 20, 16, 0.95), rgba(4, 10, 10, 0.98));
        border-color: rgba(29, 223, 116, 0.35);
      }

      .arcade-shell[data-theme="plinko"] .game-frame {
        background: linear-gradient(160deg, rgba(12, 18, 34, 0.95), rgba(6, 10, 18, 0.98));
        border-color: rgba(109, 220, 255, 0.38);
      }

      .arcade-shell[data-theme="tower"] .game-frame {
        background: linear-gradient(160deg, rgba(14, 10, 26, 0.95), rgba(6, 8, 16, 0.98));
        border-color: rgba(255, 180, 120, 0.4);
      }

      .arcade-shell[data-theme="roulette"] .game-frame {
        background: linear-gradient(160deg, rgba(22, 10, 14, 0.95), rgba(8, 6, 10, 0.98));
        border-color: rgba(255, 214, 102, 0.45);
      }

      .arcade-shell[data-theme="mines"] .game-frame {
        background: linear-gradient(160deg, rgba(20, 10, 10, 0.96), rgba(8, 6, 6, 0.98));
        border-color: rgba(255, 120, 120, 0.45);
      }

      .arcade-shell[data-theme="coinflip"] .game-frame,
      .arcade-shell[data-theme="dice"] .game-frame {
        background: linear-gradient(160deg, rgba(10, 12, 24, 0.96), rgba(8, 8, 16, 0.98));
        border-color: rgba(109, 220, 255, 0.4);
      }

      .arcade-shell[data-theme="jackpot"] .game-frame {
        background: linear-gradient(160deg, rgba(24, 12, 12, 0.96), rgba(10, 8, 6, 0.98));
        border-color: rgba(255, 214, 102, 0.5);
      }

      @keyframes aurora-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes frame-sheen {
        0%,
        55% {
          transform: translateX(-120%);
          opacity: 0.2;
        }
        75% {
          opacity: 0.6;
        }
        100% {
          transform: translateX(120%);
          opacity: 0.1;
        }
      }

      .stage-body.game-plinko {
        background:
          radial-gradient(circle at 50% 15%, rgba(255, 214, 102, 0.22), transparent 55%),
          radial-gradient(circle at 80% 70%, rgba(109, 220, 255, 0.18), transparent 55%),
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.04) 0 1px,
            transparent 1px 18px
          ),
          linear-gradient(180deg, rgba(10, 18, 34, 0.94), rgba(6, 10, 18, 0.98));
        border-color: rgba(109, 220, 255, 0.38);
        box-shadow:
          0 0 24px rgba(109, 220, 255, 0.28),
          inset 0 0 22px rgba(255, 214, 102, 0.12);
      }

      .stage-body.game-tower {
        background:
          repeating-linear-gradient(
            0deg,
            rgba(255, 255, 255, 0.06) 0 2px,
            transparent 2px 22px
          ),
          radial-gradient(circle at 20% 20%, rgba(255, 180, 120, 0.2), transparent 55%),
          linear-gradient(180deg, rgba(40, 60, 90, 0.92), rgba(10, 14, 22, 0.98));
        border-color: rgba(255, 180, 120, 0.45);
        box-shadow:
          0 0 20px rgba(255, 180, 120, 0.25),
          inset 0 0 24px rgba(109, 220, 255, 0.08);
      }

      .stage-body.game-roulette {
        background:
          radial-gradient(circle at 50% 35%, rgba(255, 214, 102, 0.32), transparent 55%),
          conic-gradient(
            from 90deg,
            rgba(30, 90, 40, 0.35),
            rgba(180, 40, 40, 0.25),
            rgba(18, 18, 18, 0.35),
            rgba(30, 90, 40, 0.35)
          ),
          linear-gradient(180deg, rgba(10, 20, 14, 0.92), rgba(8, 6, 10, 0.98));
        border-color: rgba(255, 214, 102, 0.45);
        box-shadow: 0 0 26px rgba(255, 214, 102, 0.22);
      }

      .stage-body.game-crash {
        background:
          linear-gradient(180deg, rgba(29, 223, 116, 0.08) 0 1px, transparent 1px 30px),
          linear-gradient(90deg, rgba(29, 223, 116, 0.08) 0 1px, transparent 1px 30px),
          radial-gradient(circle at 20% 20%, rgba(29, 223, 116, 0.28), transparent 55%),
          linear-gradient(180deg, rgba(8, 16, 12, 0.96), rgba(4, 8, 8, 0.98));
        border-color: rgba(29, 223, 116, 0.4);
        box-shadow: 0 0 26px rgba(29, 223, 116, 0.25);
      }

      .stage-body.game-mines {
        background:
          repeating-linear-gradient(
            135deg,
            rgba(255, 120, 120, 0.12) 0 10px,
            rgba(255, 180, 120, 0.08) 10px 20px
          ),
          radial-gradient(circle at 20% 20%, rgba(255, 120, 120, 0.28), transparent 55%),
          linear-gradient(180deg, rgba(20, 10, 10, 0.96), rgba(8, 6, 6, 0.98));
        border-color: rgba(255, 120, 120, 0.42);
        box-shadow: 0 0 24px rgba(255, 120, 120, 0.2);
      }

      .stage-body.game-coinflip,
      .stage-body.game-dice {
        background:
          radial-gradient(circle at 20% 20%, rgba(109, 220, 255, 0.25), transparent 60%),
          radial-gradient(circle at 80% 80%, rgba(177, 140, 255, 0.18), transparent 55%),
          linear-gradient(135deg, rgba(12, 14, 26, 0.96), rgba(8, 8, 14, 0.98));
        border-color: rgba(109, 220, 255, 0.4);
        box-shadow: 0 0 22px rgba(109, 220, 255, 0.2);
      }

      .stage-body.game-jackpot {
        background:
          radial-gradient(circle at 50% 20%, rgba(255, 214, 102, 0.35), transparent 55%),
          radial-gradient(circle at 70% 70%, rgba(255, 90, 90, 0.2), transparent 55%),
          linear-gradient(180deg, rgba(26, 10, 12, 0.95), rgba(10, 8, 6, 0.98));
        border-color: rgba(255, 214, 102, 0.45);
        box-shadow:
          0 0 28px rgba(255, 214, 102, 0.25),
          inset 0 0 18px rgba(255, 90, 90, 0.12);
      }

      .stage-body::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 20% 20%, var(--theme-glow), transparent 40%),
          radial-gradient(circle at 80% 20%, var(--theme-accent), transparent 45%),
          linear-gradient(180deg, rgba(8, 12, 20, 0.4), transparent 65%);
        pointer-events: none;
        animation: stage-pulse 6s ease-in-out infinite;
      }

      .stage-body::after {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 10px;
        border: 1px dashed rgba(255, 255, 255, 0.08);
        pointer-events: none;
      }

      .stage-body .particle-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image:
          radial-gradient(circle, rgba(255, 255, 255, 0.5) 0 2px, transparent 2px),
          radial-gradient(circle, rgba(255, 214, 102, 0.5) 0 2px, transparent 2px),
          radial-gradient(circle, rgba(127, 216, 255, 0.5) 0 2px, transparent 2px);
        background-size: 140px 140px, 220px 220px, 180px 180px;
        background-position: 0 0, 40px 60px, 90px 20px;
        opacity: 0.35;
        animation: particles-float 14s linear infinite;
      }

      .particle-layer.plinko {
        background-image:
          radial-gradient(circle, rgba(255, 214, 102, 0.55) 0 2px, transparent 2px),
          radial-gradient(circle, rgba(109, 220, 255, 0.45) 0 2px, transparent 2px),
          radial-gradient(circle, rgba(255, 255, 255, 0.35) 0 2px, transparent 2px);
      }

      .particle-layer.tower {
        background-image:
          radial-gradient(circle, rgba(255, 180, 120, 0.55) 0 2px, transparent 2px),
          radial-gradient(circle, rgba(109, 220, 255, 0.35) 0 2px, transparent 2px),
          radial-gradient(circle, rgba(255, 255, 255, 0.35) 0 2px, transparent 2px);
      }

      .particle-layer.roulette {
        background-image:
          radial-gradient(circle, rgba(255, 90, 90, 0.55) 0 2px, transparent 2px),
          radial-gradient(circle, rgba(30, 90, 40, 0.4) 0 2px, transparent 2px),
          radial-gradient(circle, rgba(255, 214, 102, 0.55) 0 2px, transparent 2px);
      }

      .particle-layer.crash {
        background-image:
          radial-gradient(circle, rgba(29, 223, 116, 0.55) 0 2px, transparent 2px),
          radial-gradient(circle, rgba(80, 255, 190, 0.45) 0 2px, transparent 2px),
          radial-gradient(circle, rgba(255, 255, 255, 0.35) 0 2px, transparent 2px);
      }

      .particle-layer.mines {
        background-image:
          radial-gradient(circle, rgba(255, 120, 120, 0.55) 0 2px, transparent 2px),
          radial-gradient(circle, rgba(255, 200, 120, 0.5) 0 2px, transparent 2px),
          radial-gradient(circle, rgba(255, 255, 255, 0.35) 0 2px, transparent 2px);
      }

      .particle-layer.jackpot,
      .particle-layer.dice,
      .particle-layer.coinflip {
        background-image:
          radial-gradient(circle, rgba(255, 214, 102, 0.55) 0 2px, transparent 2px),
          radial-gradient(circle, rgba(109, 220, 255, 0.4) 0 2px, transparent 2px),
          radial-gradient(circle, rgba(255, 255, 255, 0.35) 0 2px, transparent 2px);
      }

      .spark-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .spark-layer.active {
        opacity: 1;
      }

      .spark {
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: radial-gradient(circle, #fff, rgba(255, 214, 102, 0.8));
        animation: spark-burst 0.6s ease-out forwards;
      }

      @keyframes spark-burst {
        0% {

        content: "";

        inset: -18px;
        border-radius: 50%;

          from 0deg,
          rgba(255, 214, 145, 0.5),
          rgba(255, 120, 120, 0.35),

      .arcade-shell[data-theme="dice"] .coin-face {
        background: radial-gradient(circle at 30% 30%, #fff6c8, #ffb85c 60%, #ff8f3d);
        border-color: #ffd166;
        box-shadow:
          inset 0 0 16px rgba(0, 0, 0, 0.25),
          0 0 18px rgba(255, 214, 102, 0.35);
      }

      .arcade-shell[data-theme="dice"] .die {
        background: linear-gradient(160deg, rgba(240, 245, 255, 0.95), rgba(188, 205, 255, 0.95));
        border-color: rgba(80, 120, 190, 0.55);
        box-shadow:
          inset 0 0 16px rgba(0, 0, 0, 0.15),
          0 0 18px rgba(109, 220, 255, 0.25);
      }

      .arcade-shell[data-theme="dice"] .pip {
        background: #121824;
      }

      .arcade-shell[data-theme="jackpot"] .panel,
      .arcade-shell[data-theme="jackpot"] .stage {
        border-color: rgba(255, 214, 102, 0.5);
        box-shadow:
          inset 0 0 28px rgba(255, 214, 102, 0.15),
          0 0 30px rgba(255, 90, 90, 0.2);
      }

      .arcade-shell[data-theme="jackpot"] .jackpot-panel {
        background: radial-gradient(circle at 50% 0%, rgba(255, 214, 102, 0.15), transparent 65%);
        border-radius: 16px;
        padding: 16px;
        border: 1px solid rgba(255, 214, 102, 0.3);
        box-shadow: inset 0 0 24px rgba(255, 214, 102, 0.12);
      }

      .arcade-shell[data-theme="jackpot"] .tile.jackpot {
        border-radius: 14px;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        background: linear-gradient(150deg, rgba(255, 214, 102, 0.25), rgba(80, 24, 18, 0.7));
        border-color: rgba(255, 214, 102, 0.7);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.35);
      }

      .arcade-shell[data-theme="jackpot"] .tile.jackpot.win {
        box-shadow:
          0 0 24px rgba(255, 214, 102, 0.6),
          0 0 42px rgba(255, 90, 90, 0.3);
      }

      @media (max-width: 860px) {
        .arcade {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        .roulette-wrap {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="arcade-shell">
      <div class="arcade-topbar">
        <div class="arcade-topbar__left">
          <button class="btn secondary" id="backBtn">Назад в казино</button>
          <button class="btn secondary" id="musicToggle">Музыка: выкл</button>
        </div>
        <div class="arcade-badge" id="gameBadge">Arcade</div>
      </div>
      <div class="arcade">
        <aside class="panel">
        <div>
          <div class="panel-title" id="panelTitle">Arcade</div>
          <div class="panel-sub" id="panelSub"></div>
        </div>
        <div class="stat">
          <div class="stat-label">Balance</div>
          <div class="stat-value" id="balanceValue">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Bet</div>
          <input class="input" id="betInput" type="number" min="1" value="50" />
        </div>
        <div class="stat game-controls" id="gameControls"></div>
        <div class="stat">
          <div class="stat-label">Last Result</div>
          <div class="stat-value" id="lastResult">—</div>
        </div>
        <button class="btn primary" id="actionBtn">Start</button>
        <button class="btn secondary" id="cashoutBtn">Cash Out</button>
        <div class="status" id="statusBadge">Ready</div>
        </aside>
        <main class="stage">
          <div>
            <div class="stage-title" id="stageTitle">Arcade</div>
            <div class="stage-hint" id="stageHint"></div>
          </div>
          <div class="stage-body" id="stageBody"></div>
          <div class="status" id="stageStatus">Ready</div>
        </main>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const gameKey = (params.get("game") || "dice").toLowerCase();
      const inIframe = window.self !== window.top;
      const API_BASE =
        window.api ||
        (window.location.hostname === "localhost"
          ? "http://localhost:3000"
          : window.location.origin);
      const getAccessToken = () => localStorage.getItem("access_token") || "";
      const hasAuth = () => Boolean(getAccessToken());

      const panelTitle = document.getElementById("panelTitle");
      const panelSub = document.getElementById("panelSub");
      const gameBadge = document.getElementById("gameBadge");
      const balanceValue = document.getElementById("balanceValue");
      const betInput = document.getElementById("betInput");
      const lastResult = document.getElementById("lastResult");
      const actionBtn = document.getElementById("actionBtn");
      const cashoutBtn = document.getElementById("cashoutBtn");
      const statusBadge = document.getElementById("statusBadge");
      const stageTitle = document.getElementById("stageTitle");
      const stageHint = document.getElementById("stageHint");
      const stageBody = document.getElementById("stageBody");
      const stageStatus = document.getElementById("stageStatus");
      const gameControls = document.getElementById("gameControls");
      const stageShell = document.querySelector(".stage");
      const musicToggle = document.getElementById("musicToggle");
      const backBtn = document.getElementById("backBtn");
      let stageContent = null;
      let hudBetValue = null;
      let hudBalanceValue = null;

      const state = {
        ready: false,
        running: false,
        balance: 0,
        bet: 50,
        balanceSource: "parent",
      };

      const parentOrigin = window.location.origin;
      const betRequests = new Map();
      let betRequestId = 0;
      let balanceFetchedAt = 0;
      let balanceRefreshTimer = null;

      const shell = document.querySelector(".arcade-shell");
      if (inIframe) {
        shell?.classList.add("in-iframe");
      }
      if (backBtn) {
        backBtn.addEventListener("click", () => {
          window.location.assign("/casino");
        });
      }
      if (gameBadge) {
        gameBadge.textContent = `Arcade · ${gameKey.toUpperCase()}`;
      }

      let musicOn = false;
      let musicCtx = null;
      let musicNodes = [];

      const startMusic = async () => {
        if (!musicCtx) {
          musicCtx = new (window.AudioContext || window.webkitAudioContext)();
          const gain = musicCtx.createGain();
          gain.gain.value = 0.04;
          gain.connect(musicCtx.destination);

          const osc1 = musicCtx.createOscillator();
          osc1.type = "sine";
          osc1.frequency.value = 110;

          const osc2 = musicCtx.createOscillator();
          osc2.type = "triangle";
          osc2.frequency.value = 220;

          const lfo = musicCtx.createOscillator();
          lfo.type = "sine";
          lfo.frequency.value = 0.08;
          const lfoGain = musicCtx.createGain();
          lfoGain.gain.value = 18;
          lfo.connect(lfoGain).connect(osc2.frequency);

          osc1.connect(gain);
          osc2.connect(gain);

          osc1.start();
          osc2.start();
          lfo.start();

          musicNodes = [osc1, osc2, lfo];
        }
        if (musicCtx.state === "suspended") {
          await musicCtx.resume();
        }
        musicOn = true;
        if (musicToggle) {
          musicToggle.textContent = "Музыка: вкл";
        }
      };

      const stopMusic = async () => {
        musicOn = false;
        if (musicToggle) {
          musicToggle.textContent = "Музыка: выкл";
        }
        musicNodes.forEach((node) => {
          try {
            node.stop();
          } catch (e) {
            // ignore
          }
        });
        musicNodes = [];
        if (musicCtx) {
          await musicCtx.close().catch(() => undefined);
          musicCtx = null;
        }
      };

      if (musicToggle) {
        musicToggle.addEventListener("click", () => {
          if (musicOn) {
            stopMusic();
          } else {
            startMusic();
          }
        });
      }

      const formatNumber = (value) =>
        Math.max(0, Math.round(value)).toLocaleString("ru-RU");

      const fetchBalanceFromApi = async (force = false) => {
        const token = getAccessToken();
        if (!token) return false;
        if (!force && Date.now() - balanceFetchedAt < 8000) return true;
        try {
          const res = await fetch(`${API_BASE}/user/get_balance`, {
            method: "POST",
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!res.ok) return false;
          const data = await res.json();
          const next = Number.parseFloat(String(data?.data?.balance ?? 0));
          if (Number.isFinite(next)) {
            state.balanceSource = "api";
            setBalance(next);
            balanceFetchedAt = Date.now();
            return true;
          }
          return false;
        } catch (e) {
          return false;
        }
      };

      const callArcadeRound = async ({ game, action, bet, roundId, payload }) => {
        const token = getAccessToken();
        if (!token) {
          throw new Error("Unauthorized");
        }
        const res = await fetch(`${API_BASE}/casino/arcade/round`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({
            game,
            action,
            bet,
            roundId,
            payload,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(data?.message || data?.error || "Arcade round failed");
        }
        if ((data?.balanceAfterBet === undefined || data?.balanceAfterBet === null) &&
            data?.balance !== undefined &&
            data?.balance !== null) {
          const nextBalance = Number.parseFloat(String(data.balance));
          if (Number.isFinite(nextBalance)) {
            state.balanceSource = "api";
            setBalance(nextBalance);
          }
        }
        return data;
      };

      const apiArcadeBet = async (amount) => {
        const token = getAccessToken();
        if (!token) {
          throw new Error("Unauthorized");
        }
        const res = await fetch(`${API_BASE}/casino/arcade/bet`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ game: gameKey, bet: amount }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data?.message || data?.error || "Bet failed");
        }
        return res.json();
      };

      const apiArcadePayout = async (amount) => {
        const token = getAccessToken();
        if (!token) {
          throw new Error("Unauthorized");
        }
        const res = await fetch(`${API_BASE}/casino/arcade/payout`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ game: gameKey, amount }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data?.message || data?.error || "Payout failed");
        }
        return res.json();
      };

      const scheduleBalanceRefresh = () => {
        if (!hasAuth() || state.balanceSource !== "api") return;
        if (balanceRefreshTimer) {
          clearTimeout(balanceRefreshTimer);
        }
        balanceRefreshTimer = setTimeout(() => {
          fetchBalanceFromApi(true).catch(() => undefined);
        }, 1200);
      };

      const loadLocalBalance = () => {
        const stored = Number(localStorage.getItem("arcade_balance_demo") || "10000");
        return Number.isFinite(stored) ? stored : 10000;
      };

      const persistLocalBalance = () => {
        if (state.balanceSource !== "demo") return;
        localStorage.setItem("arcade_balance_demo", String(Math.max(0, state.balance)));
      };

      const loadLocalBet = () => {
        const stored = Number(params.get("bet") || localStorage.getItem("arcade_bet_demo") || "50");
        return Number.isFinite(stored) ? Math.max(1, stored) : 50;
      };

      const setBalance = (value) => {
        state.balance = Math.max(0, value);
        balanceValue.textContent = formatNumber(state.balance);
        if (hudBalanceValue) {
          hudBalanceValue.textContent = formatNumber(state.balance);
        }
        persistLocalBalance();
      };

      const setBet = (value) => {
        state.bet = Math.max(1, Number(value) || 1);
        betInput.value = state.bet;
        if (hudBetValue) {
          hudBetValue.textContent = formatNumber(state.bet);
        }
        localStorage.setItem("arcade_bet_demo", String(state.bet));
      };

      betInput.disabled = inIframe;
      betInput.addEventListener("input", () => setBet(betInput.value));
      setBet(loadLocalBet());
      if (!inIframe) {
        if (hasAuth()) {
          fetchBalanceFromApi(true).finally(() => {
            if (state.balanceSource !== "api") {
              state.balanceSource = "demo";
              setBalance(loadLocalBalance());
            }
            state.ready = true;
          });
          setInterval(() => {
            fetchBalanceFromApi().catch(() => undefined);
          }, 15000);
        } else {
          state.balanceSource = "demo";
          setBalance(loadLocalBalance());
          setStatus("Нужна авторизация");
          actionBtn.disabled = true;
          cashoutBtn.disabled = true;
          state.ready = true;
        }
      }

      const setStatus = (text) => {
        statusBadge.textContent = text;
        stageStatus.textContent = text;
      };

      const setResult = (text) => {
        lastResult.textContent = text;
      };

      const lockControls = (locked) => {
        state.running = locked;
        actionBtn.disabled = locked;
      };

      const postToParent = (payload) => {
        if (!inIframe) return;
        window.parent?.postMessage(payload, parentOrigin);
      };

      const requestBet = (amount) =>
        new Promise((resolve) => {
          if (!inIframe) {
            if (!hasAuth()) {
              resolve({ ok: false, balance: state.balance });
              return;
            }
            const doCheck = () => {
              if (state.balance < amount) {
                resolve({ ok: false, balance: state.balance });
                return;
              }
              setBalance(state.balance - amount);
              scheduleBalanceRefresh();
              resolve({ ok: true, balance: state.balance });
            };
            if (hasAuth()) {
              apiArcadeBet(amount)
                .then((data) => {
                  if (typeof data?.balance === "number") {
                    state.balanceSource = "api";
                    setBalance(Number(data.balance));
                  }
                  resolve({ ok: true, balance: state.balance });
                })
                .catch(() => {
                  fetchBalanceFromApi(true).finally(() => {
                    resolve({ ok: false, balance: state.balance });
                  });
                });
              return;
            }
            if (state.balanceSource === "api") {
              fetchBalanceFromApi(true)
                .then(() => doCheck())
                .catch(() => doCheck());
            } else {
              doCheck();
            }
            return;
          }
          const id = ++betRequestId;
          betRequests.set(id, resolve);
          postToParent({ type: "arcadeBet", id, amount });
          setTimeout(() => {
            if (betRequests.has(id)) {
              betRequests.delete(id);
              if (state.balanceSource === "demo" && state.balance >= amount) {
                setBalance(state.balance - amount);
                resolve({ ok: true, balance: state.balance });
              } else {
                resolve({ ok: false, balance: state.balance });
              }
            }
          }, 900);
        });

      const payout = (amount) => {
        if (!amount || amount <= 0) return;
        if (inIframe) {
          postToParent({ type: "arcadePayout", amount });
          if (state.balanceSource === "demo") {
            setBalance(state.balance + amount);
          }
          return;
        }
        if (hasAuth()) {
          apiArcadePayout(amount)
            .then((data) => {
              if (typeof data?.balance === "number") {
                state.balanceSource = "api";
                setBalance(Number(data.balance));
              } else {
                fetchBalanceFromApi(true).catch(() => undefined);
              }
              scheduleBalanceRefresh();
            })
            .catch(() => {
              fetchBalanceFromApi(true).catch(() => undefined);
            });
          return;
        }
        setBalance(state.balance + amount);
        scheduleBalanceRefresh();
      };

      const mountBase = (title, hint) => {
        panelTitle.textContent = title;
        panelSub.textContent = hint;
        stageTitle.textContent = title;
        stageHint.textContent = hint;
        if (gameBadge) {
          gameBadge.textContent = `Arcade · ${title}`;
        }
        stageBody.innerHTML = "";
        const particles = document.createElement("div");
        particles.className = `particle-layer ${gameKey}`;
        stageBody.appendChild(particles);
        const sparks = document.createElement("div");
        sparks.className = "spark-layer";
        stageBody.appendChild(sparks);
        const frame = document.createElement("div");
        frame.className = "game-frame";
        const hud = document.createElement("div");
        hud.className = "game-hud";
        const hudTitle = document.createElement("div");
        hudTitle.className = "game-hud__title";
        hudTitle.textContent = title;
        const hudMeta = document.createElement("div");
        hudMeta.className = "game-hud__meta";
        hudMeta.textContent = hint;
        const hudTitleWrap = document.createElement("div");
        hudTitleWrap.appendChild(hudTitle);
        hudTitleWrap.appendChild(hudMeta);
        const hudStats = document.createElement("div");
        hudStats.className = "game-hud__stats";
        const betStat = document.createElement("div");
        betStat.className = "game-hud__stat";
        const betLabel = document.createElement("small");
        betLabel.textContent = "Bet";
        hudBetValue = document.createElement("strong");
        hudBetValue.textContent = formatNumber(state.bet);
        betStat.appendChild(betLabel);
        betStat.appendChild(hudBetValue);
        const balanceStat = document.createElement("div");
        balanceStat.className = "game-hud__stat";
        const balanceLabel = document.createElement("small");
        balanceLabel.textContent = "Balance";
        hudBalanceValue = document.createElement("strong");
        hudBalanceValue.textContent = formatNumber(state.balance);
        balanceStat.appendChild(balanceLabel);
        balanceStat.appendChild(hudBalanceValue);
        hudStats.appendChild(betStat);
        hudStats.appendChild(balanceStat);
        hud.appendChild(hudTitleWrap);
        hud.appendChild(hudStats);
        stageContent = document.createElement("div");
        stageContent.className = "game-content";
        frame.appendChild(hud);
        frame.appendChild(stageContent);
        stageBody.appendChild(frame);
        Array.from(stageBody.classList)
          .filter((cls) => cls.startsWith("game-"))
          .forEach((cls) => stageBody.classList.remove(cls));
        stageBody.classList.add(`game-${gameKey}`);
        gameControls.innerHTML = "";
        cashoutBtn.disabled = true;
        stageShell?.classList.remove("auto-stage");
        stageBody.classList.remove("crash-stage");
        stageBody.classList.remove("plinko-stage");
        stageBody.classList.remove("auto-height");
        stageBody.classList.remove("scrollable");
        if (shell) {
          shell.dataset.theme = gameKey;
        }
      };

      const spawnSparks = (type = "win") => {
        const layer = stageBody.querySelector(".spark-layer");
        if (!layer) return;
        layer.innerHTML = "";
        layer.classList.add("active");
        const count = type === "win" ? 24 : 12;
        for (let i = 0; i < count; i += 1) {
          const spark = document.createElement("div");
          spark.className = "spark";
          const angle = (Math.PI * 2 * i) / count;
          const radius = type === "win" ? 120 : 80;
          const dx = Math.cos(angle) * radius * (0.6 + Math.random() * 0.6);
          const dy = Math.sin(angle) * radius * (0.6 + Math.random() * 0.6);
          spark.style.left = `${50 + (Math.random() - 0.5) * 10}%`;
          spark.style.top = `${40 + (Math.random() - 0.5) * 10}%`;
          spark.style.setProperty("--dx", `${dx}px`);
          spark.style.setProperty("--dy", `${dy}px`);
          layer.appendChild(spark);
        }
        setTimeout(() => {
          layer.classList.remove("active");
        }, 600);
      };

      const addControl = (labelText, node) => {
        const wrapper = document.createElement("div");
        wrapper.className = "control-row";
        const label = document.createElement("label");
        label.textContent = labelText;
        wrapper.appendChild(label);
        wrapper.appendChild(node);
        gameControls.appendChild(wrapper);
      };

      const games = {
        crash: {
          title: "Crash",
          hint: "Запусти раунд и нажми Cash Out до краша.",
          mount: () => {
            mountBase("Crash", "Запусти раунд и нажми Cash Out до краша.");
            stageBody.classList.add("crash-stage");
            const history = [];
            const header = document.createElement("div");
            header.className = "crash-header";
            const historyRow = document.createElement("div");
            historyRow.className = "crash-history";
            header.appendChild(historyRow);
            stageContent.appendChild(header);

            const canvas = document.createElement("canvas");
            canvas.width = 900;
            canvas.height = 420;
            stageContent.appendChild(canvas);
            const ctx = canvas.getContext("2d");
            let crashAt = 2;
            let multiplier = 1;
            let running = false;
            let startTime = 0;
            let rafId = null;
            let roundId = null;

            const result = document.createElement("div");
            result.className = "result";
            result.textContent = "0.00x";
            stageContent.appendChild(result);

            const autoCash = document.createElement("input");
            autoCash.type = "range";
            autoCash.min = "12";
            autoCash.max = "500";
            autoCash.value = "220";
            const autoCashLabel = document.createElement("span");
            autoCashLabel.className = "pill";
            autoCashLabel.textContent = "Auto 2.20x";
            autoCash.oninput = () => {
              autoCashLabel.textContent = `Auto ${(Number(autoCash.value) / 100).toFixed(2)}x`;
            };
            addControl("Auto cashout", autoCash);
            gameControls.appendChild(autoCashLabel);

            const renderHistory = () => {
              historyRow.innerHTML = "";
              history.slice(-10).forEach((value) => {
                const pill = document.createElement("span");
                pill.className = `crash-pill ${value >= 2 ? "win" : "lose"}`;
                pill.textContent = `${value.toFixed(2)}x`;
                historyRow.appendChild(pill);
              });
            };

            const draw = () => {
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
              gradient.addColorStop(0, "rgba(6, 20, 16, 0.96)");
              gradient.addColorStop(0.45, "rgba(12, 36, 28, 0.96)");
              gradient.addColorStop(1, "rgba(6, 10, 16, 0.98)");
              ctx.fillStyle = gradient;
              ctx.fillRect(0, 0, canvas.width, canvas.height);

              ctx.strokeStyle = "rgba(109, 220, 255, 0.08)";
              ctx.lineWidth = 1;
              for (let x = 0; x < canvas.width; x += 70) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
              }
              for (let y = 0; y < canvas.height; y += 60) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
              }

              const lineGradient = ctx.createLinearGradient(0, canvas.height, canvas.width, 0);
              lineGradient.addColorStop(0, "#1ddf74");
              lineGradient.addColorStop(1, "#6ddcff");
              ctx.strokeStyle = lineGradient;
              ctx.lineWidth = 4;
              ctx.shadowColor = "rgba(29, 223, 116, 0.35)";
              ctx.shadowBlur = 12;
              ctx.beginPath();
              ctx.moveTo(0, canvas.height - 20);
              const maxTime = 7500;
              const progress = Math.min(1, (performance.now() - startTime) / maxTime);
              const x = progress * canvas.width;
              const y = canvas.height - 20 - progress * (canvas.height - 70);
              ctx.lineTo(x, y);
              ctx.stroke();
              ctx.shadowColor = "rgba(109, 220, 255, 0.8)";
              ctx.shadowBlur = 16;
              ctx.fillStyle = "#6ddcff";
              ctx.beginPath();
              ctx.arc(x, y, 5, 0, Math.PI * 2);
              ctx.fill();
              ctx.shadowBlur = 0;
            };

            const tick = () => {
              if (!running) return;
              const elapsed = (performance.now() - startTime) / 1000;
              multiplier = Math.max(0, elapsed * 0.22 + elapsed * elapsed * 0.06);
              result.className = "result";
              result.textContent = `${multiplier.toFixed(2)}x`;
              draw();
              if (multiplier >= crashAt) {
                running = false;
                result.className = "result lose";
                const crashValue = Math.min(1, multiplier);
                result.textContent = `Crash ${crashValue.toFixed(2)}x`;
                history.push(multiplier);
                renderHistory();
                setResult(result.textContent);

                  blocks.push({ x: falling.x, y: falling.y, w: falling.w, h: falling.h });
                  level = blocks.length - 1;
                  falling = null;
                  current = {
                    x: 40,
                    y: baseY - (blocks.length + 1) * (blockH + gap),
                    w: Math.max(36, blocks[blocks.length - 1].w * 0.92),
                    h: blockH,
                  };
                  moving = true;
                  result.className = "result";
                  result.textContent = `Этаж: ${level}`;

              draw();
              requestAnimationFrame(tick);

            resizeCanvas();
            tick();

            const drop = () => {
              if (!active || !current || falling) return;
              moving = false;
              const prev = blocks[blocks.length - 1];
              const leftActual = Math.max(prev.x, current.x);
              const rightActual = Math.min(prev.x + prev.w, current.x + current.w);
              const actualOverlap = rightActual - leftActual;
              const actualRatio = actualOverlap > 0 ? actualOverlap / prev.w : 0;
              const onSuccess = (overlapRatio = 0.7) => {
                const overlap = Math.max(18, prev.w * overlapRatio);
                const left = prev.x + (prev.w - overlap) / 2;
                const targetY = prev.y - (blockH + gap);
                falling = {
                  x: left,
                  y: current.y,
                  w: overlap,
                  h: current.h,
                  vy: 0,
                  targetY,
                };
                current = null;
                moving = false;
                result.className = "result";
                result.textContent = "Падение...";
                spawnSparks("win");
              };
              const onFail = () => {
                active = false;
                result.className = "result lose";
                result.textContent = "Промах! Башня упала";
                setStatus("Lose");
                spawnSparks("lose");

                  game: "tower",
                  action: "drop",
                  roundId,
                })
                  .then((server) => {
                    if (!server.ok) {
                      roundId = null;
                      onFail();
                      return;
                    }
                    level = Number(server.level || level);
                    const ratio = Math.max(0.25, Math.min(0.95, actualRatio || 0.7));
                    onSuccess(ratio);
                  })
                  .catch(() => onFail());
                return;
              }
              if (actualOverlap <= 14) {
                onFail();
                return;
              }
              onSuccess(actualRatio);

                  return;
                }

                }

                  payload: { level },
                })
                  .then((server) => {
                    roundId = null;

                    result.className = "result win";
                    result.textContent = `Tower: x${multiplier.toFixed(2)} (+${finalWin.toFixed(0)})`;
                    setResult(result.textContent);

                return;

              payout(winAmount);

              rim.addColorStop(0.55, "#f6d487");
              rim.addColorStop(0.9, "#b8822d");
              rim.addColorStop(1, "#3d2a0f");
              ctx.beginPath();
              ctx.fillStyle = rim;
              ctx.arc(0, 0, radius + 14, 0, Math.PI * 2);
              ctx.fill();
              numbers.forEach((n, idx) => {
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.fillStyle = colors[idx];
                ctx.arc(0, 0, radius, idx * segment, (idx + 1) * segment);
                ctx.fill();
                ctx.strokeStyle = "rgba(0, 0, 0, 0.5)";
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.save();
                ctx.rotate(idx * segment + segment / 2);
                ctx.fillStyle = "#fefcff";
                ctx.font = "bold 12px Inter, sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.rotate(Math.PI / 2);
                ctx.fillText(String(n), 0, -radius + 22);
                ctx.restore();
              });
              ctx.beginPath();
              ctx.fillStyle = "#10141f";
              ctx.arc(0, 0, radius * 0.42, 0, Math.PI * 2);
              ctx.fill();
              ctx.beginPath();
              ctx.fillStyle = "rgba(255, 214, 102, 0.5)";
              ctx.arc(0, 0, radius * 0.2, 0, Math.PI * 2);
              ctx.fill();
              ctx.restore();
            };
            drawWheel();

            const board = document.createElement("div");
            board.className = "roulette-board";
            const boardTitle = document.createElement("div");
            boardTitle.className = "roulette-board-title";
            boardTitle.textContent = "Стол ставок";
            const boardSummary = document.createElement("div");
            boardSummary.className = "roulette-summary";
            boardSummary.textContent = "Последний номер: —";
            const legend = document.createElement("div");
            legend.className = "roulette-legend";
            const redChip = document.createElement("div");
            redChip.className = "roulette-chip red";
            redChip.textContent = "RED x2";
            const blackChip = document.createElement("div");
            blackChip.className = "roulette-chip black";
            blackChip.textContent = "BLACK x2";
            const greenChip = document.createElement("div");
            greenChip.className = "roulette-chip green";
            greenChip.textContent = "GREEN x14";
            legend.appendChild(redChip);
            legend.appendChild(blackChip);
            legend.appendChild(greenChip);
            const zeroRow = document.createElement("div");
            zeroRow.className = "roulette-zero-row";
            const grid = document.createElement("div");
            grid.className = "roulette-grid";
            const boardNumbers = Array.from({ length: 36 }, (_, i) => i + 1);
            const boardCells = new Map();
            const createCell = (num) => {
              const cell = document.createElement("div");
              const color = num === 0 ? "green" : redSet.has(num) ? "red" : "black";
              cell.className = `roulette-number ${color}`;
              cell.textContent = String(num);
              boardCells.set(num, cell);
              if (num === 0) {
                zeroRow.appendChild(cell);
              } else {
                grid.appendChild(cell);
              }
            };
            createCell(0);
            boardNumbers.forEach((num) => createCell(num));
            board.appendChild(boardTitle);
            board.appendChild(zeroRow);
            board.appendChild(grid);
            board.appendChild(boardSummary);
            board.appendChild(legend);

            const spin = async () => {
              actionBtn.classList.add("glow-active");
              let targetIndex = Math.floor(Math.random() * numbers.length);
              let landed = numbers[targetIndex];
              let winAmount = 0;
              if (hasAuth() && !inIframe) {
                try {
                  const server = await callArcadeRound({
                    game: "roulette",
                    action: "spin",
                    bet: state.bet,
                    payload: { choice },
                  });
                  landed = Number(server.landed);
                  targetIndex = numbers.indexOf(landed);
                  if (targetIndex < 0) targetIndex = Math.floor(Math.random() * numbers.length);
                  winAmount = Number(server.win || 0);
                } catch (e) {
                  setStatus("Недостаточно средств");
                  return { win: false, text: "Недостаточно средств" };
                }
              } else {
                const betResult = await requestBet(state.bet);
                if (!betResult.ok) {
                  setStatus("Недостаточно средств");
                  return { win: false, text: "Недостаточно средств" };
                }
              }
              const segment = (Math.PI * 2) / numbers.length;
              const targetRotation = Math.PI * 10 + (numbers.length - targetIndex) * segment;
              const start = performance.now();
              const duration = 3200;
              return new Promise((resolve) => {
                const animate = (time) => {
                  const t = Math.min(1, (time - start) / duration);
                  const ease = 1 - Math.pow(1 - t, 3);
                  rotation = targetRotation * ease;
                  const ballAngle = -rotation * 1.35;
                  const baseRadius = wheelCanvas.width / 2 - 46;
                  const radius = baseRadius + (1 - ease) * 22;
                  ball.style.transform = `translate(-50%, -50%) translate(${Math.cos(ballAngle) * radius}px, ${Math.sin(ballAngle) * radius}px)`;
                  const tickIndex = Math.floor(((rotation % (Math.PI * 2)) / (Math.PI * 2)) * numbers.length);
                  if (tickIndex !== lastTick) {
                    lastTick = tickIndex;
                    playTick();
                  }
                  drawWheel();
                  if (t < 1) {
                    requestAnimationFrame(animate);
                    return;
                  }
                  const color = landed === 0 ? "green" : redSet.has(landed) ? "red" : "black";
                  if (activeNumber !== null) {
                    boardCells.get(activeNumber)?.classList.remove("active");
                  }
                  activeNumber = landed;
                  if (boardCells.has(landed)) {
                    boardCells.get(landed).classList.add("active");
                  }
                  boardSummary.textContent = `Последний номер: ${landed} (${color.toUpperCase()})`;
                  const multiplier = choice === "green" ? 14 : 2;
                  const win = hasAuth() && !inIframe ? winAmount > 0 : color === choice;
                  const clientWinAmount = win ? state.bet * multiplier : 0;
                  if (!hasAuth() || inIframe) {
                    if (win) payout(clientWinAmount);
                  }
                  const finalWin = hasAuth() && !inIframe ? winAmount : clientWinAmount;
                  if (finalWin > 0) {
                    spawnSparks("win");
                  } else {
                    spawnSparks("lose");
                  }
                  actionBtn.classList.remove("glow-active");
                  result.className = `result ${finalWin > 0 ? "win" : "lose"}`;
                  result.textContent = `Roulette: ${landed} ${color.toUpperCase()} ${
                    finalWin > 0 ? `(+${finalWin.toFixed(0)})` : ""
                  }`;
                  setResult(result.textContent);
                  resolve({ win: finalWin > 0, text: result.textContent });
                };
                requestAnimationFrame(animate);
              });
            };

            actionBtn.textContent = "Spin";
            actionBtn.onclick = () => spin();
            cashoutBtn.disabled = true;

            rouletteWrap.appendChild(shell);
            rouletteWrap.appendChild(board);
            stageContent.appendChild(result);
            stageContent.appendChild(choiceWrap);
            stageContent.appendChild(rouletteWrap);

            return {
              autoPlay: () => spin(),
            };
          },
        },
      };

      const activeGame = games[gameKey] || games.dice;
      const controller = activeGame.mount();
      setStatus("Ready");

      const autoPlay = () => {
        if (state.running) return Promise.resolve({ win: false, text: "" });
        state.running = true;
        lockControls(true);
        setStatus("Spinning...");
        return controller.autoPlay()
          .then((result) => {
            setResult(result.text || "-");
            setStatus(result.win ? "Win!" : "Ready");
            return result;
          })
          .finally(() => {
            state.running = false;
            lockControls(false);
          });
      };

      if (inIframe) {
        window.addEventListener("message", (event) => {
          if (!event.data || typeof event.data !== "object") return;
          if (event.data.type === "init") {
            state.ready = true;
            postToParent({ type: "ready" });
          }
          if (event.data.type === "arcadeInit") {
            if (typeof event.data.balance === "number") {
              setBalance(event.data.balance);
              state.balanceSource = event.data.source || "parent";
            }
            if (typeof event.data.bet === "number") {
              setBet(event.data.bet);
            }
            state.ready = true;
            postToParent({ type: "ready" });
          }
          if (event.data.type === "betUpdate") {
            setBet(event.data.bet);
          }
          if (event.data.type === "arcadeBalance") {
            if (typeof event.data.balance === "number") {
              setBalance(event.data.balance);
            }
          }
          if (event.data.type === "arcadeBetResult") {
            const resolve = betRequests.get(event.data.id);
            if (resolve) {
              betRequests.delete(event.data.id);
              if (typeof event.data.balance === "number") {
                setBalance(event.data.balance);
                state.balanceSource = "parent";
              }
              resolve({ ok: Boolean(event.data.ok), balance: event.data.balance });
            }
          }
          if (event.data.type === "spin" && state.ready) {
            autoPlay().then((result) => {
              postToParent({ type: "spinComplete", resultText: result.text, win: result.win });
            });
          }
        });

        postToParent({ type: "ready" });
        postToParent({ type: "arcadeRequestBalance" });
      }
    </script>
  </body>
</html>
