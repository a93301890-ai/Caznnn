<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hyperdrive Spin</title>
    <style>
      :root {
        color-scheme: dark;
        --panel: rgba(10, 16, 24, 0.88);
        --accent: #7fd8ff;
        --accent-strong: #a6f2ff;
        --frame: rgba(127, 216, 255, 0.4);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(127, 216, 255, 0.25), transparent 50%),
          radial-gradient(circle at 80% 10%, rgba(166, 242, 255, 0.2), transparent 45%),
          linear-gradient(160deg, #08101a 0%, #0b0f1f 45%, #04060b 100%);
        color: #e9faff;
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
        padding: 20px;
      }

      #slot {
        width: min(980px, 96vw);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(12, 18, 30, 0.95), rgba(5, 8, 14, 0.9));
        border: 1px solid var(--frame);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
        padding: 18px;
        position: relative;
        overflow: hidden;
      }

      #slot.win::after {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 14px;
        border: 2px solid var(--accent-strong);
        box-shadow: 0 0 26px rgba(166, 242, 255, 0.7);
        animation: pulse 1.1s ease-in-out;
        pointer-events: none;
      }

      .slot-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        gap: 12px;
      }

      .slot-title {
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent-strong);
      }

      .slot-badge {
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--frame);
        background: rgba(127, 216, 255, 0.12);
        font-size: 12px;
      }

      #reels {
        display: flex;
        width: 100%;
        height: min(55vh, calc((3 / 5) * 100vw));
        max-height: 420px;
        border-radius: 16px;
        background: var(--panel);
        padding: 10px;
        gap: 8px;
      }

      .reel {
        overflow: hidden;
        width: 20%;
        height: 100%;
        position: relative;
        border-radius: 14px;
        background: rgba(12, 18, 28, 0.9);
        border: 1px solid rgba(127, 216, 255, 0.2);
        box-shadow: inset 0 0 18px rgba(0, 0, 0, 0.55);
      }

      .reel > .icons {
        position: relative;
        display: flex;
        flex-direction: column;
      }

      .reel > .icons > img {
        width: calc(100% + 6px);
        margin: -3px 0 0 -3px;
        height: auto;
        padding: 10px;
        border-radius: 12px;
        background: rgba(12, 18, 30, 0.75);
        border: 1px solid rgba(127, 216, 255, 0.25);
        transform: translate3d(0, 0, 0);
      }

      .slot-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 12px;
        font-size: 13px;
        color: rgba(233, 250, 255, 0.7);
      }

      .status {
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid rgba(127, 216, 255, 0.2);
        background: rgba(10, 16, 24, 0.7);
      }

      @keyframes pulse {
        0% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.5;
        }
      }
    </style>
  </head>
  <body>
    <div id="slot">
      <div class="slot-header">
        <div class="slot-title">Hyperdrive Spin</div>
        <div class="slot-badge">Open Source</div>
      </div>
      <div id="reels"></div>
      <div class="slot-footer">
        <span>Demo reel powered by GitHub</span>
        <span class="status" id="status">Ready</span>
      </div>
    </div>
    <script>
      const state = {
        symbols: [],
        reelCount: 5,
        ready: false,
        spinning: false,
      };

      const reelsRoot = document.getElementById("reels");
      const slotRoot = document.getElementById("slot");
      const statusEl = document.getElementById("status");
      let reels = [];

      const setStatus = (text) => {
        if (statusEl) statusEl.textContent = text;
      };

      const imagePool = () =>
        state.symbols.map((symbol) => symbol.image).filter(Boolean);

      const randomImage = () => {
        const pool = imagePool();
        if (!pool.length) return "";
        return pool[Math.floor(Math.random() * pool.length)];
      };

      const createIcon = (src) => {
        const img = new Image();
        img.src = src || "";
        img.alt = "slot";
        return img;
      };

      class Reel {
        constructor(reelContainer, idx, initialImages) {
          this.reelContainer = reelContainer;
          this.idx = idx;
          this.symbolContainer = document.createElement("div");
          this.symbolContainer.classList.add("icons");
          this.reelContainer.appendChild(this.symbolContainer);
          initialImages.forEach((image) => this.symbolContainer.appendChild(createIcon(image)));
          this.animation = this.symbolContainer.animate(
            [
              { top: 0, filter: "blur(0)" },
              { filter: "blur(2px)", offset: 0.5 },
              {
                top: `calc((${Math.floor(this.factor) * 10} / 3) * -100% - (${
                  Math.floor(this.factor) * 10
                } * 3px))`,
                filter: "blur(0)",
              },
            ],
            {
              duration: this.factor * 1000,
              easing: "ease-in-out",
            },
          );
          this.animation.cancel();
        }

        get factor() {
          return 1 + Math.pow(this.idx / 2, 2);
        }

        renderSymbols(nextImages) {
          const fragment = document.createDocumentFragment();
          for (let i = 3; i < 3 + Math.floor(this.factor) * 10; i++) {
            const image =
              i >= 10 * Math.floor(this.factor) - 2
                ? nextImages[i - Math.floor(this.factor) * 10]
                : randomImage();
            fragment.appendChild(createIcon(image));
          }
          this.symbolContainer.appendChild(fragment);
        }

        spin() {
          const animationPromise = new Promise(
            (resolve) => (this.animation.onfinish = resolve),
          );
          const timeoutPromise = new Promise((resolve) =>
            setTimeout(resolve, this.factor * 1000),
          );
          this.animation.cancel();
          this.animation.play();
          return Promise.race([animationPromise, timeoutPromise]).then(() => {
            if (this.animation.playState !== "finished") this.animation.finish();
            const max = this.symbolContainer.children.length - 3;
            for (let i = 0; i < max; i += 1) {
              this.symbolContainer.firstChild.remove();
            }
          });
        }
      }

      const buildInitialSymbols = () =>
        Array.from({ length: state.reelCount }, () =>
          Array.from({ length: 3 }, () => randomImage()),
        );

      const buildReels = (initialSymbols) => {
        reelsRoot.innerHTML = "";
        reels = [];
        for (let i = 0; i < state.reelCount; i += 1) {
          const reelContainer = document.createElement("div");
          reelContainer.className = "reel";
          reelsRoot.appendChild(reelContainer);
          reels.push(new Reel(reelContainer, i, initialSymbols[i]));
        }
      };

      const spin = (reelImages, isWin) => {
        setStatus("Spinning...");
        slotRoot.classList.remove("win");
        const normalized = Array.from({ length: state.reelCount }, (_, index) => {
          const images = reelImages?.[index];
          if (Array.isArray(images) && images.length) {
            return images.slice(0, 3);
          }
          return Array.from({ length: 3 }, () => randomImage());
        });
        return Promise.all(
          reels.map((reel, index) => {
            reel.renderSymbols(normalized[index]);
            return reel.spin();
          }),
        ).then(() => {
          setStatus(isWin ? "Win!" : "Ready");
          if (isWin) {
            slotRoot.classList.add("win");
            window.setTimeout(() => slotRoot.classList.remove("win"), 1100);
          }
        });
      };

      window.addEventListener("message", (event) => {
        if (!event.data || typeof event.data !== "object") return;
        if (event.data.type === "init") {
          state.symbols = Array.isArray(event.data.symbols) ? event.data.symbols : [];
          state.reelCount = Number(event.data.reelCount) || 5;
          const initial = buildInitialSymbols();
          buildReels(initial);
          state.ready = true;
          setStatus("Ready");
          window.parent.postMessage({ type: "ready" }, window.location.origin);
        }
        if (event.data.type === "spin" && state.ready) {
          const reels = Array.isArray(event.data.reels) ? event.data.reels : [];
          const win = Boolean(event.data.win);
          spin(reels, win).then(() => {
            window.parent.postMessage({ type: "spinComplete" }, window.location.origin);
          });
        }
      });

      window.parent.postMessage({ type: "ready" }, window.location.origin);
    </script>
  </body>
</html>
